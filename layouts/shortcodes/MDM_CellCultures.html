<!-- Shortcode for the CellCultures MetaDataMaker (MDM) field -->

<!-- Import the JS script -->
<script defer
        language="javascript"
        type="text/javascript"
        src='{{ "js/MDM_cell_cultures.js" | urlize | relURL }}'>
</script>

<h2>Cell Cultures</h2>
<div class="stdMetaField">
    <label class="metaLabel" for="cell_type">
        Cell Type:
    </label>
    <input type="text"
           id="cell_type"
           class="metaValue"
           data-meta-info="Cell Type"
           data-meta-group="cell_cultures"
           data-meta-key="cell_type">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="batch">
        Batch:
    </label>
    <input type="text"
           id="batch"
           class="metaValue"
           data-meta-info="Batch"
           data-meta-group="cell_cultures"
           data-meta-key="batch">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="batch">
        Lineage:
    </label>
    <input type="text"
           id="batch"
           class="metaValue"
           data-meta-info="Batch"
           data-meta-group="cell_cultures"
           data-meta-key="batch">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="primary_culture">
        Primary Cell Culture:
    </label>
    <input type="checkbox"
           id="primary_culture"
           class="metaValue"
           data-meta-info="Primary Cell Culture"
           data-meta-group="cell_cultures"
           data-meta-key="primary_culture"
           onchange="toggleCellLineFields()">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="passage">
        Passage:
    </label>
    <input type="number"
           step="any"
           inputmode="decimal"
           id="passage"
           class="metaValue cellLineOnly"
           data-meta-info="Passage"
           data-meta-group="cell_cultures"
           data-meta-key="passage">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="dics">
        Days in Culture:
    </label>
    <input type="number"
           step="any"
           inputmode="decimal"
           id="dics"
           class="metaValue"
           data-meta-info="Days in Culture"
           data-meta-group="cell_cultures"
           data-meta-key="days_in_culture">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="medium">
        Base Medium:
    </label>
    <input type="text"
           id="medium"
           class="metaValue"
           data-meta-info="Base Medium"
           data-meta-group="cell_cultures"
           data-meta-key="base_medium">
</div>

<div class="stdMetaField">
    <label class="metaLabel" for="condition">
        Experimental Condition:
    </label>
    <input type="text"
           id="condition"
           class="metaValue"
           data-meta-info="Experimental Condition"
           data-meta-group="cell_cultures"
           data-meta-key="experimental_condition">
</div>
